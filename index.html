<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月水ナイター出欠</title>
<style>
  :root{
    --night:#0F1726; --card:#1B2536; --lamp:#FFC247;
    --text:#EAF0F7; --muted:#8FA0B8; --line:#2A3650; --today:#5BD68A;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:var(--night); color:var(--text);
    max-width:480px; margin:0 auto; padding:24px 16px 48px;
  }
  .splash{text-align:center; padding:80px 16px;}
  .splash .date{font-size:40px;font-weight:800;margin:12px 0 4px;}
  .splash .dow{font-size:18px;color:var(--lamp);}
  .splash .note{font-size:13px;color:var(--muted);margin-top:24px;}
  .splash a{color:var(--lamp);}

  header{margin-bottom:18px;}
  .eyebrow{font-size:11px;letter-spacing:0.18em;color:var(--lamp);margin-bottom:6px;}
  h1{font-size:20px;}
  .sub{font-size:12px;color:var(--muted);margin-top:4px;}
  .section-label{font-size:12px;color:var(--muted);letter-spacing:0.1em;margin:20px 0 8px;}
  a.event{
    display:block;text-decoration:none;color:var(--text);
    background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:14px;margin-bottom:8px;font-size:16px;
  }
  a.event.hero{border-color:var(--lamp);}
  a.event:active{transform:scale(0.98);}
  .d-dow{color:var(--lamp);font-size:13px;margin-left:8px;}
  .badge{font-size:11px;font-weight:700;padding:2px 10px;border-radius:99px;float:right;}
  .badge.today{background:var(--today);color:#08130C;}
  .badge.next{background:var(--lamp);color:#1B1300;}
  a.event.past{opacity:0.5;border-color:transparent;}
  details summary{font-size:13px;color:var(--muted);cursor:pointer;padding:8px 0;list-style:none;}
  details summary::before{content:"▸ ";}
  details[open] summary::before{content:"▾ ";}
  .board-link{display:block;text-align:center;font-size:13px;color:var(--muted);text-decoration:underline;margin-top:20px;}
  .addbox{margin-top:22px;background:var(--card);border:1px dashed var(--line);border-radius:12px;padding:14px;}
  .addbox h2{font-size:14px;margin-bottom:8px;}
  .addbox label{font-size:12px;color:var(--muted);display:block;margin:8px 0 4px;}
  .addbox input{width:100%;padding:12px;border-radius:8px;border:1px solid var(--line);background:var(--night);color:var(--text);font-size:16px;}
  .addbox button{width:100%;margin-top:12px;padding:13px;border:none;border-radius:10px;background:var(--lamp);color:#1B1300;font-size:15px;font-weight:700;}
  .msg{font-size:12px;margin-top:8px;color:var(--today);}
  .msg.err{color:#FF8A8A;}
  .del{background:none;border:none;color:var(--muted);font-size:11px;text-decoration:underline;margin:0 0 8px;padding:2px 0;}
  .warn{border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:13px;line-height:1.6;}
  .warn.low{background:#3A2E12;border:1px solid var(--lamp);color:#FFE6A6;}
  .warn.empty{background:#3A1A1A;border:1px solid #FF8A8A;color:#FFD2D2;}
  .warn a{color:inherit;font-weight:700;}
  .lastdate{font-size:11px;color:var(--muted);margin-top:4px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ================= 設定 =================
const GID = "14un6e";
const BASE = "http://chotto-ii.com/apps/mobile/?gid=" + GID + "&eid=";

// イベント対応表（掲示板 2026/07/07時点）
// 新しいイベントが追加されたら、この表に1行足してください。
// 書式: {date:"YYYY-MM-DD", eid:"イベントID"},
const builtinEvents = [
  {date:"2026-06-08", eid:"342959"},
  {date:"2026-06-10", eid:"342960"},
  {date:"2026-06-15", eid:"342961"},
  {date:"2026-06-17", eid:"342962"},
  {date:"2026-06-22", eid:"343359"},
  {date:"2026-06-24", eid:"343360"},
  {date:"2026-06-29", eid:"343361"},
  {date:"2026-07-01", eid:"343362"},
  {date:"2026-07-08", eid:"344412"},
  {date:"2026-07-13", eid:"344413"},
  {date:"2026-07-15", eid:"344414"},
  {date:"2026-07-22", eid:"344415"},
  {date:"2026-07-27", eid:"344416"},
  {date:"2026-07-29", eid:"344417"}
];

// 自動遷移までの表示時間（ミリ秒）。0なら即時遷移。
const REDIRECT_DELAY = 800;
// 「今後の練習」がこの件数以下になったら更新を促す警告を表示。
const LOW_THRESHOLD = 2;
// ========================================

const STORE_KEY = "nighter:user-events";
let userEvents = [];
try{
  const s = localStorage.getItem(STORE_KEY);
  if(s) userEvents = JSON.parse(s);
}catch(e){}

function saveUserEvents(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(userEvents)); }catch(e){}
}

const DOW = ["日","月","火","水","木","金","土"];
function fmt(dstr){
  const d = new Date(dstr + "T00:00:00");
  return {num:(d.getMonth()+1)+"/"+d.getDate(), dow:DOW[d.getDay()]};
}
function todayStr(){
  const n = new Date();
  return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0");
}
function allEvents(){
  return [...builtinEvents, ...userEvents]
    .filter((e,i,arr)=>arr.findIndex(x=>x.eid===e.eid)===i)
    .sort((a,b)=>a.date.localeCompare(b.date));
}

const params = new URLSearchParams(location.search);
const menuMode = params.has("menu") || location.hash === "#menu";

const today = todayStr();
const upcoming = allEvents().filter(e=>e.date >= today);

if(!menuMode && upcoming.length){
  // ===== 自動リダイレクト =====
  const e = upcoming[0];
  const f = fmt(e.date);
  const isToday = e.date === today;
  document.getElementById("app").innerHTML =
    '<div class="splash">' +
      '<div style="font-size:12px;letter-spacing:0.2em;color:var(--lamp);">月水ナイター</div>' +
      '<div class="date">' + f.num + '</div>' +
      '<div class="dow">(' + f.dow + ') ' + (isToday ? '今日の練習' : '次回の練習') + '</div>' +
      '<div class="note">出欠ページへ移動中…<br>' +
      '<a href="' + BASE + e.eid + '">移動しない場合はこちらをタップ</a><br><br>' +
      '<a href="?menu=1" style="color:var(--muted);">一覧・設定を開く（自動移動を止める）</a></div>' +
    '</div>';
  setTimeout(()=>{ location.replace(BASE + e.eid); }, REDIRECT_DELAY);
}else{
  renderMenu();
}

function renderMenu(){
  const past = allEvents().filter(e=>e.date < today).reverse();
  const all = allEvents();
  const lastDate = all.length ? all[all.length-1].date : null;
  let html =
    '<header><div class="eyebrow">月水ナイター</div><h1>出欠確認ランチャー</h1>' +
    '<div class="sub">今日: ' + fmt(today).num + ' (' + fmt(today).dow + ')</div>' +
    (lastDate ? '<div class="lastdate">対応表: ' + fmt(lastDate).num + ' (' + fmt(lastDate).dow + ') まで登録済み</div>' : '') +
    '</header>';

  // ===== 期限切れ／残りわずかの警告 =====
  const boardTop = 'http://chotto-ii.com/apps/mobile/?gid=' + GID;
  if(upcoming.length === 0){
    html += '<div class="warn empty">今後の練習が登録されていません。' +
      '<a href="' + boardTop + '">掲示板</a>で最新のイベントを確認し、下のフォームから追加するか index.html の対応表を更新してください。</div>';
  }else if(upcoming.length <= LOW_THRESHOLD){
    html += '<div class="warn low">今後の練習が残り ' + upcoming.length + ' 件です。' +
      '<a href="' + boardTop + '">掲示板</a>で次回以降のイベントを確認して追加しておくと安心です。</div>';
  }

  if(upcoming.length){
    html += '<div class="section-label">今後の練習</div>';
    upcoming.forEach((e,idx)=>{
      const f = fmt(e.date);
      let badge = "";
      if(e.date === today) badge = '<span class="badge today">今日</span>';
      else if(idx===0) badge = '<span class="badge next">次回</span>';
      html += '<a class="event' + (idx===0?' hero':'') + '" href="' + BASE + e.eid + '">' +
        f.num + '<span class="d-dow">(' + f.dow + ') 練習</span>' + badge + '</a>';
      if(e.user){
        html += '<button class="del" data-eid="' + e.eid + '">この追加イベントを削除</button>';
      }
    });
  }else{
    html += '<div class="section-label">今後のイベントが登録されていません。フォームから追加してください。</div>';
  }

  if(past.length){
    html += '<details><summary>終了した練習（' + past.length + '件）</summary>';
    past.forEach(e=>{
      const f = fmt(e.date);
      html += '<a class="event past" href="' + BASE + e.eid + '">' +
        f.num + '<span class="d-dow">(' + f.dow + ') 練習</span></a>';
    });
    html += '</details>';
  }

  html += '<a class="board-link" href="http://chotto-ii.com/apps/mobile/?gid=' + GID + '">掲示板トップを開く（全イベント一覧）</a>';

  html +=
    '<div class="addbox"><h2>イベントを追加（この端末のみ）</h2>' +
    '<label>イベントページのURL</label>' +
    '<input type="text" id="urlInput" placeholder="http://chotto-ii.com/apps/mobile/?gid=14un6e&eid=343500" inputmode="url">' +
    '<label>練習日</label><input type="date" id="dateInput">' +
    '<button id="addBtn" type="button">追加する</button>' +
    '<div class="msg" id="addMsg"></div>' +
    '<div style="font-size:11px;color:var(--muted);margin-top:10px;">全員に反映するには GitHub 上の index.html の対応表を編集してください。</div></div>';

  document.getElementById("app").innerHTML = html;

  document.getElementById("addBtn").onclick = ()=>{
    const msg = document.getElementById("addMsg");
    const url = document.getElementById("urlInput").value.trim();
    const date = document.getElementById("dateInput").value;
    const m = url.match(/eid=(\d+)/);
    if(!m){ msg.textContent="URLからイベントID（eid=数字）が見つかりません。"; msg.className="msg err"; return; }
    if(!date){ msg.textContent="練習日を選択してください。"; msg.className="msg err"; return; }
    userEvents.push({date:date, eid:m[1], user:true});
    saveUserEvents();
    location.href = "?menu=1";
  };

  document.querySelectorAll(".del").forEach(btn=>{
    btn.onclick = ()=>{
      userEvents = userEvents.filter(x=>x.eid!==btn.dataset.eid);
      saveUserEvents();
      location.href = "?menu=1";
    };
  });
}
</script>
</body>
</html>
