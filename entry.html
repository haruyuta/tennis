<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>島根県テニス協会 大会エントリー一覧 R8年度</title>
<style>
  :root{
    --court:#1f6f43;      /* コートグリーン */
    --court-d:#16502f;
    --line:#e7ece8;
    --ink:#1a221d;
    --sub:#5f6d64;
    --bg:#f6f8f6;
    --card:#ffffff;
    --warn:#b8402a;       /* 締切間近 */
    --warn-bg:#fdeee9;
    --soon:#a86a12;       /* 1週間以内 */
    --soon-bg:#fdf4e3;
    --done:#8a948c;       /* 締切済 */
    --done-bg:#f0f2f0;
    --ok:#1f6f43;
    --ok-bg:#e8f3ec;
  }
  *{box-sizing:border-box}
  body{
    margin:0;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;
    background:var(--bg);color:var(--ink);font-size:15px;line-height:1.6;
  }
  header{
    background:var(--court);color:#fff;padding:18px 20px;
    border-bottom:4px solid var(--court-d);
  }
  header h1{margin:0;font-size:20px;font-weight:700;letter-spacing:.02em}
  header .meta{font-size:12.5px;opacity:.85;margin-top:3px}
  .wrap{max-width:1000px;margin:0 auto;padding:16px}

  .controls{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:14px;margin-bottom:14px;display:flex;flex-direction:column;gap:12px;
  }
  .search{
    width:100%;padding:11px 14px;font-size:15px;border:1.5px solid var(--line);
    border-radius:9px;outline:none;
  }
  .search:focus{border-color:var(--court)}
  .filter-group{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .filter-label{font-size:12px;color:var(--sub);margin-right:4px;min-width:42px}
  .chip{
    border:1.5px solid var(--line);background:#fff;color:var(--sub);
    padding:5px 12px;border-radius:20px;font-size:13px;cursor:pointer;
    transition:.12s;user-select:none;
  }
  .chip:hover{border-color:var(--court)}
  .chip.on{background:var(--court);color:#fff;border-color:var(--court)}

  .toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  .count{font-size:13px;color:var(--sub)}
  .count b{color:var(--ink)}
  .sortbtn{
    font-size:13px;border:1.5px solid var(--line);background:#fff;border-radius:8px;
    padding:6px 12px;cursor:pointer;color:var(--ink);
  }
  .sortbtn:hover{border-color:var(--court)}

  .card{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;margin-bottom:11px;border-left:5px solid var(--line);
  }
  .card.upcoming{border-left-color:var(--court)}
  .card.warn{border-left-color:var(--warn)}
  .card.soon{border-left-color:var(--soon)}
  .card.done{border-left-color:var(--done);opacity:.72}

  .card-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
  .title{font-size:16px;font-weight:700;line-height:1.4}
  .badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
  .badge{font-size:11.5px;padding:2px 8px;border-radius:5px;font-weight:600;white-space:nowrap}
  .b-type{background:#eef3f0;color:var(--court-d)}
  .b-grade{background:#e9eef6;color:#33507e}
  .b-org{background:#f3ecf6;color:#6a3f80}

  .deadline{text-align:right;flex-shrink:0;min-width:118px}
  .dl-date{font-size:14px;font-weight:700}
  .dl-tag{display:inline-block;font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:6px;margin-top:3px}
  .t-ok{background:var(--ok-bg);color:var(--ok)}
  .t-soon{background:var(--soon-bg);color:var(--soon)}
  .t-warn{background:var(--warn-bg);color:var(--warn)}
  .t-done{background:var(--done-bg);color:var(--done)}

  .info{margin-top:11px;display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:13.5px}
  .info dt{color:var(--sub);white-space:nowrap}
  .info dd{margin:0}
  .note{margin-top:9px;font-size:12.5px;color:var(--sub);background:#fafbfa;border-radius:7px;padding:7px 10px;border:1px solid var(--line)}

  .empty{text-align:center;padding:40px 20px;color:var(--sub)}
  footer{text-align:center;font-size:12px;color:var(--sub);padding:20px}

  @media(max-width:560px){
    .card-top{flex-direction:column}
    .deadline{text-align:left;min-width:0}
    .info{grid-template-columns:1fr}
    .info dt{margin-top:4px}
  }
</style>
</head>

<header>

      <span class="chip on" data-f="cat" data-v="all">すべて</span>
      <span class="chip" data-f="cat" data-v="一般">一般</span>
      <span class="chip" data-f="cat" data-v="ベテラン">ベテラン</span>
      <span class="chip" data-f="cat" data-v="団体">団体</span>
      <span class="chip" data-f="cat" data-v="シニア">シニア</span>
      <span class="chip" data-f="cat" data-v="ジュニア">ジュニア</span>
    </div>
    <div class="filter-group">
      <span class="filter-label">形式</span>
      <span class="chip on" data-f="fmt" data-v="all">すべて</span>
      <span class="chip" data-f="fmt" data-v="シングルス">シングルス</span>
      <span class="chip" data-f="fmt" data-v="ダブルス">ダブルス</span>
      <span class="chip" data-f="fmt" data-v="団体戦">団体戦</span>
    </div>
    <div class="filter-group">
      <span class="filter-label">締切</span>
      <span class="chip on" data-f="stat" data-v="all">すべて</span>
      <span class="chip" data-f="stat" data-v="open">締切前のみ</span>
      <span class="chip" data-f="stat" data-v="done">締切済</span>
    </div>
  </div>

  <div class="toolbar">
    <div class="count"><b id="num">0</b> 件</div>
    <button class="sortbtn" id="sort">並べ替え：締切が近い順 ▾</button>
  </div>

  <div id="list"></div>
  <div class="empty" id="empty" style="display:none">該当する大会がありません。条件を変えてください。</div>
</div>

const F={org:"all",cat:"all",fmt:"all",stat:"all"};
let SORT="dl"; // dl=締切近い順, date=開催日順

function dlInfo(d){
  if(!d) return {days:null,cls:"unk",tag:"締切は要項参照",tcls:"t-soon",cardcls:"upcoming"};
  const dt=new Date(d+"T00:00:00"); dt.setHours(0,0,0,0);
  const days=Math.round((dt-TODAY)/86400000);
  if(days<0) return {days,tag:"締切済",tcls:"t-done",cardcls:"done"};
  if(days===0) return {days,tag:"本日締切",tcls:"t-warn",cardcls:"warn"};
  if(days<=7) return {days,tag:"あと"+days+"日",tcls:"t-warn",cardcls:"warn"};
  if(days<=21) return {days,tag:"あと"+days+"日",tcls:"t-soon",cardcls:"soon"};
  return {days,tag:"あと"+days+"日",tcls:"t-ok",cardcls:"upcoming"};
}

function match(d){
  const org=d.org||"県協会";
  if(F.org!=="all" && org!==F.org) return false;
  if(F.cat!=="all" && !d.cat.includes(F.cat)) return false;
  if(F.fmt!=="all" && !d.fmt.includes(F.fmt)) return false;
  const info=dlInfo(d.dl);
  if(F.stat==="open" && (info.days===null || info.days<0)) return false;
  if(F.stat==="done" && !(info.days!==null && info.days<0)) return false;
  const q=document.getElementById("search").value.trim().toLowerCase();
  if(q){
    const hay=(d.name+d.seibi+d.venue+d.cat.join("")+d.fmt.join("")+d.note+(d.grade||"")+(d.org||"県協会")).toLowerCase();
    if(!hay.includes(q)) return false;
  }
  return true;
}

function render(){
  const list=document.getElementById("list");
  let rows=DATA.filter(match);
  rows.sort((a,b)=>{
    if(SORT==="dl"){
      const ia=dlInfo(a.dl), ib=dlInfo(b.dl);
      // 締切前を残日数小さい順→締切済→未定 の順
      const rank=x=> x.days===null?2 : x.days<0?1 : 0;
      const ra=rank(ia),rb=rank(ib);
      if(ra!==rb) return ra-rb;
      if(ra===0) return ia.days-ib.days;
      if(ra===1) return ib.days-ia.days; // 締切済は新しく過ぎた順
      return 0;
    } else {
      return (a.dl||"9999").localeCompare(b.dl||"9999");
    }
  });

  document.getElementById("num").textContent=rows.length;
  document.getElementById("empty").style.display=rows.length?"none":"block";

  list.innerHTML=rows.map(d=>{
    const info=dlInfo(d.dl);
    const badges=[`<span class="badge b-org">${d.org||"県協会"}</span>`,
                 ...d.cat.map(c=>`<span class="badge b-type">${c}</span>`),
                 ...d.fmt.map(f=>`<span class="badge b-type">${f}</span>`),
                 (d.grade&&d.grade!=="—"&&d.grade!=="対象外")?`<span class="badge b-grade">${d.grade}</span>`:""].join("");
    return `<div class="card ${info.cardcls}">
      <div class="card-top">
        <div>
          <div class="title">${d.name}</div>
          <div class="badges">${badges}</div>
        </div>
        <div class="deadline">
          <div class="dl-date">締切 ${d.dlraw}</div>
          <span class="dl-tag ${info.tcls}">${info.tag}</span>
        </div>
      </div>
      <dl class="info">
        <dt>種目</dt><dd>${d.seibi}</dd>
        <dt>会場</dt><dd>${d.venue}</dd>
        <dt>開催日</dt><dd>${d.date}</dd>
        <dt>参加料</dt><dd>${d.fee}</dd>
      </dl>
      ${d.note?`<div class="note">${d.note}</div>`:""}
    </div>`;
  }).join("");
}

document.querySelectorAll(".chip").forEach(c=>{
  c.addEventListener("click",()=>{
    const f=c.dataset.f;
    document.querySelectorAll(`.chip[data-f="${f}"]`).forEach(x=>x.classList.remove("on"));
    c.classList.add("on");
    F[f]=c.dataset.v;
    render();
  });
});
document.getElementById("search").addEventListener("input",render);
document.getElementById("sort").addEventListener("click",function(){
  SORT = SORT==="dl"?"date":"dl";
  this.textContent = SORT==="dl"?"並べ替え：締切が近い順 ▾":"並べ替え：開催日順 ▾";
  render();
});

render();
</script>
